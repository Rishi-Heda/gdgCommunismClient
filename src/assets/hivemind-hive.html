<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveMind · Live Network</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }

  .hive-section {
    width: 100%;
    max-width: 1100px;
    padding: 60px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .hive-label {
    color: rgba(197, 255, 0, 0.45);
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
  }

  .hive-wrap {
    position: relative;
    width: 100%;
    border: 0.5px solid rgba(197, 255, 0, 0.1);
    border-radius: 12px;
    overflow: hidden;
    background: #0a0a0a;
  }

  canvas {
    display: block;
    width: 100%;
    height: 480px;
  }

  .hive-footer {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-val {
    color: #C5FF00;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .stat-lbl {
    color: rgba(255,255,255,0.25);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .stat-sep {
    width: 1px;
    height: 28px;
    background: rgba(197,255,0,0.15);
  }
</style>
</head>
<body>
<section class="hive-section">
  <span class="hive-label">Live Compute Network</span>

  <div class="hive-wrap">
    <canvas id="hive"></canvas>
  </div>

  <div class="hive-footer">
    <div class="stat">
      <span class="stat-val" id="stat-nodes">0</span>
      <span class="stat-lbl">Active Nodes</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-val" id="stat-jobs">0</span>
      <span class="stat-lbl">Jobs Routing</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-val" id="stat-tflops">0.0</span>
      <span class="stat-lbl">TFLOPS</span>
    </div>
  </div>
</section>

<script>
(function () {
  const ACCENT     = '#C5FF00';
  const ACCENT_R   = 197;
  const ACCENT_G   = 255;
  const ACCENT_B   = 0;
  const ac = (a) => `rgba(${ACCENT_R},${ACCENT_G},${ACCENT_B},${a})`;

  const CITY_LABELS = [
    'MUM','DEL','NYC','LON','TYO','SYD','BER',
    'SGP','DXB','LAX','CHI','SFO','AMS',
    'PAR','SEO','HKG','TOR','SAO','MSC'
  ];

  // Axial coords for rings 0, 1, 2 of a pointy-top hex grid
  const RING_COORDS = [
    [0,0],
    [1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1],
    [2,0],[2,-1],[2,-2],[1,-2],[0,-2],[-1,-1],
    [-2,0],[-2,1],[-2,2],[-1,2],[0,2],[1,1]
  ];

  const canvas = document.getElementById('hive');
  const ctx    = canvas.getContext('2d');

  let W, H, dpr, hexR, nodes = [], particles = [];
  let lastFrame = 0, lastSpawn = 0, spawnGap = 600;
  let totalCompleted = 0;

  /* ── Resize ── */
  function resize() {
    const rect = canvas.getBoundingClientRect();
    dpr  = window.devicePixelRatio || 1;
    W    = rect.width;
    H    = rect.height;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    hexR = Math.min(62, Math.floor(W / 15));
    nodes.forEach(n => applyPos(n));
  }

  function applyPos(n) {
    const cx = W / 2, cy = H / 2;
    const s  = Math.sqrt(3);
    n.x = cx + hexR * s * (n.q + n.r * 0.5);
    n.y = cy + hexR * 1.5 * n.r;
  }

  /* ── Hex drawing ── */
  function hexPath(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i + Math.PI / 6;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  /* ── Init nodes ── */
  function initNodes() {
    nodes = RING_COORDS.map(([q, r], i) => {
      const n = {
        q, r, id: i,
        label: CITY_LABELS[i],
        active: Math.random() > 0.25,
        phase:  Math.random() * Math.PI * 2,
        pulsePeriod: 1800 + Math.random() * 1200,
        nextToggle: 7000 + Math.random() * 18000,
        receiveFlash: 0,
        sendFlash: 0,
        x: 0, y: 0,
      };
      applyPos(n);
      return n;
    });
  }

  /* ── Spawn particle ── */
  function spawnParticle() {
    const active = nodes.filter(n => n.active);
    if (active.length < 2) return;
    const src = active[Math.floor(Math.random() * active.length)];
    const pool = active.filter(n => n !== src);
    const dst  = pool[Math.floor(Math.random() * pool.length)];
    src.sendFlash = 1;
    particles.push({
      sx: src.x, sy: src.y,
      ex: dst.x, ey: dst.y,
      t: 0,
      speed: 0.35 + Math.random() * 0.25,
      dstId: dst.id,
      trail: [],
      done: false,
    });
  }

  /* ── Update ── */
  function update(ts, dt) {
    // Spawn
    if (ts - lastSpawn > spawnGap) {
      spawnParticle();
      if (Math.random() > 0.55) spawnParticle();
      lastSpawn = ts;
      spawnGap = 480 + Math.random() * 700;
    }

    // Particles
    particles.forEach(p => {
      if (p.done) return;
      p.t += p.speed * dt / 1000;
      const clampedT = Math.min(p.t, 1);
      const px = p.sx + (p.ex - p.sx) * clampedT;
      const py = p.sy + (p.ey - p.sy) * clampedT;
      p.trail.unshift([px, py, clampedT]);
      if (p.trail.length > 22) p.trail.pop();
      if (p.t >= 1 && !p.done) {
        p.done = true;
        totalCompleted++;
        const node = nodes[p.dstId];
        if (node) { node.receiveFlash = 1; }
      }
    });
    particles = particles.filter(p => !(p.done && p.trail.length === 0));
    particles.forEach(p => { if (p.done) p.trail.pop(); });

    // Node toggles & flashes
    nodes.forEach(n => {
      n.nextToggle -= dt;
      if (n.nextToggle <= 0) {
        n.active = !n.active;
        n.nextToggle = 6000 + Math.random() * 20000;
      }
      if (n.receiveFlash > 0) n.receiveFlash = Math.max(0, n.receiveFlash - dt / 500);
      if (n.sendFlash    > 0) n.sendFlash    = Math.max(0, n.sendFlash    - dt / 350);
    });
  }

  /* ── Draw ── */
  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // Very subtle dot-grid texture
    for (let gx = 0; gx < W; gx += 38) {
      for (let gy = 0; gy < H; gy += 38) {
        ctx.beginPath();
        ctx.arc(gx, gy, 0.6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(197,255,0,0.04)';
        ctx.fill();
      }
    }

    nodes.forEach(node => {
      const t = ts * 0.001;
      const pulse = Math.sin(t * (6.28 / (node.pulsePeriod / 1000)) + node.phase);

      if (node.active) {
        // Hex fill — breathing
        const fillA = 0.07 + 0.05 * ((pulse + 1) * 0.5);
        hexPath(node.x, node.y, hexR - 3);
        ctx.fillStyle = ac(fillA);
        ctx.fill();

        // Hex border
        const strokeA = 0.18 + 0.12 * ((pulse + 1) * 0.5);
        hexPath(node.x, node.y, hexR - 3);
        ctx.strokeStyle = ac(strokeA);
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Receive flash ring (hex)
        if (node.receiveFlash > 0) {
          const rf = node.receiveFlash;
          hexPath(node.x, node.y, (hexR - 3) * (1 + (1 - rf) * 0.4));
          ctx.strokeStyle = ac(rf * 0.9);
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        // Send flash
        if (node.sendFlash > 0) {
          const sf = node.sendFlash;
          hexPath(node.x, node.y, (hexR - 3) * (1 + (1 - sf) * 0.15));
          ctx.strokeStyle = ac(sf * 0.5);
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }

        // Center dot
        ctx.beginPath();
        ctx.arc(node.x, node.y, 3.2, 0, Math.PI * 2);
        ctx.fillStyle = ACCENT;
        ctx.fill();

        // Expanding pulse ring
        const ringPhase = ((ts * 0.001 / (node.pulsePeriod / 1000)) + node.phase / (Math.PI * 2)) % 1;
        const ringR = ringPhase * 24 + 6;
        const ringA = (1 - ringPhase) * 0.45;
        ctx.beginPath();
        ctx.arc(node.x, node.y, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = ac(ringA);
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // City label
        ctx.fillStyle = ac(0.45);
        ctx.font = `bold 8px 'Courier New', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.label, node.x, node.y + 18);

      } else {
        // Inactive — ghost outline only
        hexPath(node.x, node.y, hexR - 3);
        ctx.strokeStyle = ac(0.06);
        ctx.lineWidth = 0.5;
        ctx.stroke();
        hexPath(node.x, node.y, hexR - 3);
        ctx.fillStyle = ac(0.015);
        ctx.fill();
      }
    });

    // Particles (jobs in flight)
    particles.forEach(p => {
      if (p.trail.length === 0) return;

      // Trail
      p.trail.forEach(([tx, ty], i) => {
        const frac = 1 - (i / p.trail.length);
        ctx.beginPath();
        ctx.arc(tx, ty, frac * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = ac(frac * 0.75);
        ctx.fill();
      });

      // Head
      if (!p.done) {
        const [hx, hy] = p.trail[0];

        // Outer glow
        const g = ctx.createRadialGradient(hx, hy, 0, hx, hy, 12);
        g.addColorStop(0, ac(0.45));
        g.addColorStop(1, ac(0));
        ctx.beginPath();
        ctx.arc(hx, hy, 12, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();

        // White core
        ctx.beginPath();
        ctx.arc(hx, hy, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        // Yellow ring
        ctx.beginPath();
        ctx.arc(hx, hy, 5, 0, Math.PI * 2);
        ctx.strokeStyle = ac(0.7);
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    });
  }

  /* ── DOM stats ── */
  let lastStatUpdate = 0;
  function updateStats(ts) {
    if (ts - lastStatUpdate < 800) return;
    lastStatUpdate = ts;
    const activeCount = nodes.filter(n => n.active).length;
    const jobCount    = particles.filter(p => !p.done).length;
    const tflops      = (activeCount * 2.1 + Math.sin(ts * 0.0004) * 3.5).toFixed(1);
    document.getElementById('stat-nodes').textContent  = activeCount;
    document.getElementById('stat-jobs').textContent   = jobCount;
    document.getElementById('stat-tflops').textContent = tflops;
  }

  /* ── Loop ── */
  function loop(ts) {
    const dt = Math.min(ts - lastFrame, 64);
    lastFrame = ts;
    update(ts, dt);
    draw(ts);
    updateStats(ts);
    requestAnimationFrame(loop);
  }

  /* ── Boot ── */
  initNodes();
  resize();
  window.addEventListener('resize', () => {
    resize();
  });
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
